[package]
name = "ruvix-integration"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "MIT OR Apache-2.0"
authors = ["RuVector Contributors"]
description = "Integration tests for the RuVix Cognition Kernel (ADR-087)"
keywords = ["kernel", "integration-test", "capability", "region", "queue"]
categories = ["development-tools::testing"]
repository = "https://github.com/ruvnet/ruvector"
readme = "README.md"

# This is a test-only crate, not for publishing
publish = false

[lib]
crate-type = ["rlib"]

[dependencies]
ruvix-types = { version = "0.1.0", path = "../crates/types" }
ruvix-region = { version = "0.1.0", path = "../crates/region" }
ruvix-queue = { version = "0.1.0", path = "../crates/queue" }
ruvix-cap = { version = "0.1.0", path = "../crates/cap" }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1.4"

[features]
default = []
std = ["ruvix-types/std", "ruvix-region/std", "ruvix-queue/std", "ruvix-cap/std"]
alloc = ["ruvix-types/alloc", "ruvix-region/alloc", "ruvix-queue/alloc", "ruvix-cap/alloc"]

[[bench]]
name = "integration_bench"
harness = false

[profile.test]
opt-level = 0
debug = true

[profile.bench]
opt-level = 3
lto = true
