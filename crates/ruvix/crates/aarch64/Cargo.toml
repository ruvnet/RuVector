[package]
name = "ruvix-aarch64"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "MIT OR Apache-2.0"
description = "AArch64 support for RuVix Cognition Kernel (ADR-087)"
keywords = ["kernel", "aarch64", "arm64", "no_std", "bare-metal"]
categories = ["no-std", "embedded", "os"]
repository = "https://github.com/ruvnet/ruvector"
readme = "README.md"

[lib]
crate-type = ["rlib"]

[dependencies]
ruvix-types = { version = "0.1.0", path = "../types" }
ruvix-hal = { version = "0.1.0", path = "../hal" }

[features]
default = []
qemu-virt = []
