[package]
name = "ruvix-types"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "MIT OR Apache-2.0"
authors = ["RuVector Contributors"]
description = "No-std kernel interface types for the RuVix Cognition Kernel (ADR-087)"
keywords = ["kernel", "cognition", "no_std", "capability", "proof-gated"]
categories = ["no-std", "embedded", "os"]
repository = "https://github.com/ruvnet/ruvector"
readme = "README.md"

[lib]
crate-type = ["rlib"]

# Zero external dependencies for the kernel type crate
[dependencies]
# No dependencies - pure no_std types

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1.5"

[features]
default = []
std = []
alloc = []

[[bench]]
name = "type_construction"
harness = false

[[bench]]
name = "serialization"
harness = false

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
