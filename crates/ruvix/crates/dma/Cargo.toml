[package]
name = "ruvix-dma"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "MIT OR Apache-2.0"
description = "DMA controller abstraction for RuVix Cognition Kernel (ADR-087)"
keywords = ["kernel", "dma", "no_std", "embedded", "memory"]
categories = ["no-std", "embedded", "hardware-support"]
repository = "https://github.com/ruvnet/ruvector"
readme = "README.md"

[lib]
crate-type = ["rlib"]

[dependencies]
ruvix-types = { version = "0.1.0", path = "../types" }
ruvix-hal = { version = "0.1.0", path = "../hal" }

[dev-dependencies]
proptest = "1.5"

[features]
default = []
std = []
alloc = []
