[[scenarios]]
name = "load-balancing"
description = "Test task distribution across cluster"

[[scenarios.steps]]
action = "wait"
duration_ms = 5000

[[scenarios.steps]]
action = "deploy"
rvf_path = "./load-test.rvf"

[[scenarios.steps]]
action = "broadcast"
message = "GENERATE_LOAD:tasks=1000"

[[scenarios.steps]]
action = "wait"
duration_ms = 60000

[[scenarios.steps]]
action = "metrics"
output = "./metrics-load-balance.json"

[[scenarios.assertions]]
type = "load_variance"
expected = "<0.2"  # Tasks should be evenly distributed
