# Standalone Cargo.toml for Docker builds
# This avoids workspace inheritance issues
[package]
name = "rvagent-learning"
version = "0.1.0"
edition = "2021"
rust-version = "1.77"
license = "MIT OR Apache-2.0"
authors = ["ruvnet"]
repository = "https://github.com/ruvnet/ruvector"
description = "Daily learning and optimization loop with GOAP reasoning for rvAgent"

[dependencies]
# Core dependencies
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
anyhow = "1.0"
tracing = "0.1"

# Async runtime
tokio = { version = "1.37", features = ["full"] }
async-trait = "0.1"
futures = "0.3"

# Time and scheduling
chrono = { version = "0.4", features = ["serde"] }
cron = "0.12"

# UUID for discovery IDs
uuid = { version = "1.8", features = ["v4", "serde"] }

# HTTP client for API calls - pin to avoid edition2024 deps
reqwest = { version = "0.11", features = ["json", "rustls-tls"], default-features = false }

# File watching for continuous mode
notify = { version = "6.1", optional = true }

# Pin getrandom and rand to avoid edition2024 requirement
getrandom = "0.2"
rand = "0.8"

[dependencies.tracing-subscriber]
version = "0.3"
features = ["env-filter"]

[features]
default = ["scheduler"]
scheduler = ["dep:notify"]
full = ["scheduler"]

[lib]
crate-type = ["rlib"]

[[bin]]
name = "daily_cycle"
path = "src/bin/daily_cycle.rs"

[lints.clippy]
manual_range_contains = "allow"
