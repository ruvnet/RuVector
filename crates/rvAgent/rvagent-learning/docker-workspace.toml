[workspace]
members = ["crates/rvAgent/rvagent-learning"]
resolver = "2"

[workspace.package]
edition = "2021"
rust-version = "1.77"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
anyhow = "1.0"
tracing = "0.1"
tokio = { version = "1.37", features = ["full"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.8", features = ["v4", "serde"] }

# Pin getrandom to avoid edition2024 requirement
getrandom = "=0.2"
rand = "=0.8"
