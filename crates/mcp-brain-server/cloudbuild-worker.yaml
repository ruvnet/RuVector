steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ruvbrain-worker:latest'
      - '-f'
      - 'crates/mcp-brain-server/Dockerfile.worker'
      - '.'
images:
  - 'gcr.io/$PROJECT_ID/ruvbrain-worker:latest'
timeout: '3600s'
options:
  machineType: 'E2_HIGHCPU_32'
