[package]
name = "ruvector-rabitq"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "RaBitQ: rotation-based 1-bit quantization for ultra-fast approximate nearest-neighbor search with theoretical error bounds"

[[bin]]
name = "rabitq-demo"
path = "src/main.rs"

[[bench]]
name = "rabitq_bench"
harness = false

[dependencies]
rand = { workspace = true }
rand_distr = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }

# rayon is native-only — wasm32 falls back to sequential iteration
# in `from_vectors_parallel_with_rotation`. Output is bit-identical
# because rotation is deterministic.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rayon = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
