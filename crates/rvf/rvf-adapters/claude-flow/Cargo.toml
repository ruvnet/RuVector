[package]
name = "rvf-adapter-claude-flow"
version = "0.1.0"
edition = "2021"
description = "RVF adapter for Claude-Flow AI agent memory with audit trails"
license = "MIT OR Apache-2.0"
repository = "https://github.com/ruvnet/ruvector"
rust-version = "1.87"

[features]
default = ["std"]
std = []

[dependencies]
rvf-runtime = { path = "../../rvf-runtime", features = ["std"] }
rvf-types = { path = "../../rvf-types", features = ["std"] }
rvf-crypto = { path = "../../rvf-crypto", features = ["std"] }

[dev-dependencies]
tempfile = "3"
