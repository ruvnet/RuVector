[package]
name = "rvf-mcp"
version = "0.1.0"
edition = "2021"
description = "MCP server exposing RVF memory, pattern, witness, and coordination tools"
license = "MIT OR Apache-2.0"
repository = "https://github.com/ruvnet/ruvector"
rust-version = "1.87"

[[bin]]
name = "rvf-mcp"
path = "src/main.rs"

[lib]
name = "rvf_mcp"
path = "src/lib.rs"

[dependencies]
rvf-runtime = { path = "../rvf-runtime", features = ["std"] }
rvf-types = { path = "../rvf-types", features = ["std"] }
rvf-adapter-claude-flow = { path = "../rvf-adapters/claude-flow" }
rvf-adapter-agentdb = { path = "../rvf-adapters/agentdb" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dev-dependencies]
tempfile = "3"
